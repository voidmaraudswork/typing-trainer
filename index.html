<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLOINGEX TYPE MASTER</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <h1>LLOINGEX TYPE MASTER</h1>

        <div class="practice-set-panel">
            <h2>Practice Sets</h2>
            <div class="practice-controls">
                <label for="preset-select">Choose a preset</label>
                <select id="preset-select"></select>
            </div>
            <div class="practice-controls">
                <label for="custom-text">Or paste custom text</label>
                <textarea id="custom-text" placeholder="Paste your own practice text here..." rows="5"></textarea>
                <button id="load-custom-btn" type="button">Load Custom Text</button>
            </div>
        </div>

        <div id="stats">
            <p>WPM: <span id="wpm">0</span></p>
            <p>Accuracy: <span id="accuracy">100</span>%</p>
        </div>

        <div id="quote-display"></div>
        <textarea id="input-field" placeholder="Start typing here..." autocomplete="off" rows="5"></textarea>

        <div class="button-row">
            <button id="reset-btn" type="button">Reset</button>
            <button id="toggle-sound" type="button">Sound: ON</button>
        </div>
    </div>

    <!-- Completion Modal -->
    <div id="completion-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title">Results</h2>
            <div class="modal-stats">
                <p>WPM: <span id="modal-wpm">0</span></p>
                <p>Accuracy: <span id="modal-accuracy">100</span>%</p>
            </div>
            <p id="modal-message" class="modal-message"></p>
            <center>
            <button id="modal-close-btn" type="button">Try Again</button>
            </center>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
